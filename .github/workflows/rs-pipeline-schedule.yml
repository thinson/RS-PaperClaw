name: RS Pipeline Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 * * 1-5"

concurrency:
  group: rs-pipeline-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.RS_GITHUB_TOKEN }}
      BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
      RS_GITHUB_REPO: ${{ vars.RS_GITHUB_REPO }}
      BAILIAN_MODEL: ${{ vars.BAILIAN_MODEL }}
      BAILIAN_API_URL: ${{ vars.BAILIAN_API_URL }}
      GITHUB_TIMEOUT: ${{ vars.GITHUB_TIMEOUT }}
      GITHUB_RETRY: ${{ vars.GITHUB_RETRY }}
      ARXIV_API_URL: ${{ vars.ARXIV_API_URL }}
      ARXIV_USER_AGENT: ${{ vars.ARXIV_USER_AGENT }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      FEISHU_TARGET: ${{ vars.FEISHU_TARGET }}
      OPENCLAW_BIN: ${{ vars.OPENCLAW_BIN }}
      RS_FILTER_KEYWORDS_FILE: scripts/config/filter_keywords.json
      RS_FILTER_PROMPT_FILE: scripts/prompts/filter_cross_prompt.md
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        working-directory: skills/rs-paper-pipeline
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Doctor
        working-directory: skills/rs-paper-pipeline
        run: python3 scripts/cli.py doctor

      - name: Run scheduled pipeline
        working-directory: skills/rs-paper-pipeline
        run: |
          set -euo pipefail
          if [[ -n "${DINGTALK_WEBHOOK:-}" || -n "${FEISHU_TARGET:-}" ]]; then
            echo "MODE run"
            python3 scripts/cli.py run
          else
            echo "MODE run --no-notify"
            python3 scripts/cli.py run --no-notify
          fi

      - name: Print pipeline state
        if: always()
        working-directory: skills/rs-paper-pipeline
        run: |
          if ls memory/pipeline_state/*.json >/dev/null 2>&1; then
            for file in memory/pipeline_state/*.json; do
              echo "===== ${file} ====="
              cat "${file}"
            done
          else
            echo "No pipeline_state json found"
          fi

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rs-pipeline-runtime-schedule
          path: |
            skills/rs-paper-pipeline/memory/
